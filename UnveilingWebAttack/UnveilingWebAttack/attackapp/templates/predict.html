{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Predict Attack Type</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f2f5f7;
            font-family: 'Segoe UI', sans-serif;
            padding: 40px;
        }
        .container-box {
            background-color: white;
            padding: 40px;
            max-width: 650px;
            margin: auto;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        h1 {
            margin-bottom: 25px;
            color: #007bff;
        }
        label {
            margin-top: 10px;
            font-weight: 500;
        }
        .btn-primary {
            width: 100%;
            margin-top: 20px;
        }
        h2 {
            margin-top: 30px;
            color: #28a745;
        }
        .alert {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container-box">
        <h1 class="text-center">Attack Type Prediction</h1>
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Source IP:</label>
                <input type="text" name="source_ip" class="form-control" required>
                
                <label>Destination IP:</label>
                <input type="text" name="destination_ip" class="form-control" required>
                
                <label>Protocol:</label>
                <input type="text" name="protocol" class="form-control" required>
                
                <label>TCP Flags:</label>
                <input type="text" name="tcp_flags" class="form-control" required>

                <label>Source Port:</label>
                <input type="number" name="source_port" class="form-control" required>

                <label>Destination Port:</label>
                <input type="number" name="destination_port" class="form-control" required>

                <label>Packet Size:</label>
                <input type="number" name="packet_size" class="form-control" required>

                <label>Duration (sec):</label>
                <input type="text" name="duration_sec" class="form-control" required>

                <button type="submit" class="btn btn-primary">Predict</button>
                
                <center><button><a href="{% url 'logout_user' %}">🔓 Logout</a></button></centre>
                <center><button><a href="{% url 'user_profile' %}">👤 View Profile</a></button></centre>
            </div>
        </form>

        {% if prediction %}
            <div class="alert alert-success text-center">
                <h2>Predicted Attack Type:</h2>
                <strong>{{ prediction }}</strong>
            </div>
        {% endif %}

        {% if error %}
            <div class="alert alert-danger text-center">
                <strong>Error:</strong> {{ error }}
            </div>
            
        {% endif %}
    </div>
</body>
</html>
