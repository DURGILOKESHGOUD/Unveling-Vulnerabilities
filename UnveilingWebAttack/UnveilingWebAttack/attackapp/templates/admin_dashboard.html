<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .dashboard {
            max-width: 600px;
            margin: 60px auto;
            padding: 40px;
            background-color: #ffffff;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        .dashboard h1 {
            font-size: 28px;
            margin-bottom: 30px;
            text-align: center;
            color: #343a40;
        }
        .dashboard ul {
            list-style: none;
            padding: 0;
        }
        .dashboard li {
            margin-bottom: 15px;
        }
        .dashboard a {
            text-decoration: none;
            font-size: 18px;
            display: block;
            padding: 12px;
            border-radius: 10px;
            background-color: #007bff;
            color: white;
            transition: background-color 0.3s ease;
        }
        .dashboard a:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<div class="dashboard">
    <h1>Welcome Admin</h1>
    <ul>
        <li><a href="{% url 'upload_dataset' %}">📁 Upload Dataset</a></li>
        <li><a href="{% url 'train_models' %}">🤖 Train Models</a></li>
        <li><a href="{% url 'view_users' %}">👥 View All Users</a></li>
        <li><a href="{% url 'view_predictions' %}">📊 View User Predictions</a></li>
        <li><a href="{% url 'admin_logout' %}">🔓 Logout</a></li>
    </ul>
</div>

</body>
</html>
