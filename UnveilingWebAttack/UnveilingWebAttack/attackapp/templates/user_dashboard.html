<!DOCTYPE html>
<html>
<head>
    <title>User Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(to right, #f0f4f7, #d9e4f5);
            font-family: 'Segoe UI', sans-serif;
            padding-top: 50px;
        }
        .dashboard {
            max-width: 600px;
            margin: auto;
            background: #fff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #0d6efd;
            margin-bottom: 30px;
            text-align: center;
        }
        .dashboard ul {
            list-style: none;
            padding: 0;
        }
        .dashboard ul li {
            margin: 15px 0;
        }
        .dashboard ul li a {
            text-decoration: none;
            font-size: 18px;
            display: block;
            padding: 12px 20px;
            background-color: #007bff;
            color: white;
            border-radius: 8px;
            transition: background 0.3s;
        }
        .dashboard ul li a:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<div class="dashboard">
    <h1>Welcome, {{ request.session.user_name }}</h1>
    <ul>
        <li><a href="{% url 'user_profile' %}">👤 View Profile</a></li>
        <li><a href="{% url 'predict_attack' %}">📊 Go to Predict</a></li>
        <li><a href="{% url 'logout_user' %}">🔓 Logout</a></li>
    </ul>
</div>

</body>
</html>
