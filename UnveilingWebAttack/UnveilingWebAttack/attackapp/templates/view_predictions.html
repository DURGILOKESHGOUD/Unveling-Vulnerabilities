<!DOCTYPE html>
<html>
<head>
    <title>User Predictions History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(to right, #edf2f7, #dbe9f4);
            font-family: 'Segoe UI', sans-serif;
            padding: 50px;
        }
        .container-box {
            max-width: 1100px;
            margin: auto;
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }
        h1 {
            color: #0d6efd;
            text-align: center;
            margin-bottom: 30px;
        }
        .table th, .table td {
            vertical-align: middle;
            text-align: center;
        }
        .btn-back {
            display: block;
            margin: 30px auto 0 auto;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container-box">
    <h1>User Predictions History</h1>

    <table class="table table-bordered table-striped">
        <thead class="table-primary">
        <tr>
            <th>User ID</th>
            <th>Session</th>
            <th>Source IP</th>
            <th>Destination IP</th>
            <th>Prediction</th>
            <th>Time</th>
        </tr>
        </thead>
        <tbody>
        {% for pred in predictions %}
        <tr>
            <td>{{ pred.user_id }}</td>
            <td>{{ pred.session_id }}</td>
            <td>{{ pred.source_ip }}</td>
            <td>{{ pred.destination_ip }}</td>
            <td>{{ pred.mitm_prediction }}</td>
            <td>{{ pred.timestamp }}</td>
        </tr>
        {% endfor %}
        </tbody>
    </table>

    <div class="btn-back">
        <a href="{% url 'admin_dashboard' %}" class="btn btn-outline-secondary">← Back to Dashboard</a>
    </div>
</div>

</body>
</html>
