<!DOCTYPE html>
<html>
<head>
    <title>Train Models</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(to right, #fdfbfb, #ebedee);
            font-family: 'Segoe UI', sans-serif;
            padding: 50px;
        }
        .container-box {
            background: white;
            padding: 40px;
            max-width: 700px;
            margin: auto;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
        h2 {
            color: #0d6efd;
            text-align: center;
            margin-bottom: 25px;
        }
        .btn-link {
            margin-top: 30px;
        }
    </style>
</head>
<body>

<div class="container-box">
    <h2>Train Machine Learning Models</h2>

    {% if message %}
        <div class="alert alert-success text-center">
            {{ message }}
        </div>
    {% endif %}

    {% if accuracy %}
        <h4 class="text-success">Model Accuracy:</h4>
        <ul class="list-group">
            {% for model, score in accuracy.items %}
                <li class="list-group-item d-flex justify-content-between align-items-center">
                    <strong>{{ model }}</strong>
                    <span class="badge bg-primary rounded-pill">{{ score|floatformat:2 }}%</span>
                </li>
            {% endfor %}
        </ul>
    {% endif %}

    <div class="text-center btn-link">
        <a href="{% url 'admin_dashboard' %}" class="btn btn-outline-secondary">← Back to Dashboard</a>
        <a href="{% url 'upload_dataset' %}" class="btn btn-outline-primary me-2">📁 Upload New Dataset</a>
        <a href="{% url 'admin_logout' %}" class="btn btn-outline-danger">🔒 Logout</a>
        
    </div>
</div>

</body>
</html>
