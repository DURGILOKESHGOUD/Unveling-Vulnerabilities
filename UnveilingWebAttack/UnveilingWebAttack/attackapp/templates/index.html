<!DOCTYPE html>
<html>
<head>
    <title>Welcome - Web Attack Detection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #74ebd5, #acb6e5);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container-box {
            background-color: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 20px;
            color: #333;
        }
        p {
            font-size: 18px;
            margin-bottom: 30px;
        }
        .btn-custom {
            padding: 12px 28px;
            font-size: 16px;
            margin: 10px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="container-box">
    <h1>Unveiling Web Attack Vulnerabilities</h1>
    <p>Choose your login type:</p>
    <div>
        <a href="{% url 'admin_login' %}" class="btn btn-primary btn-custom">Admin Login</a>
        <a href="{% url 'login_user' %}" class="btn btn-success btn-custom">User Login</a>
	<bottom><p>Mansoor@Copyright 2025</p></bottom>
    </div>
</div>

</body>
</html>
