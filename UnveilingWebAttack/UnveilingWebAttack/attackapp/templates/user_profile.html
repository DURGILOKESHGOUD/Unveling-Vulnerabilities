<!DOCTYPE html>
<html>
<head>
    <title>User Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(to right, #f2f6fa, #e6eef3);
            font-family: 'Segoe UI', sans-serif;
            padding: 50px;
        }
        .profile-container {
            max-width: 700px;
            margin: auto;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #0d6efd;
            margin-bottom: 30px;
            text-align: center;
        }
        .table {
            margin-bottom: 30px;
        }
        .btn-back {
            display: block;
            width: fit-content;
            margin: auto;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="profile-container">
    <h1>User Profile</h1>

    <table class="table table-bordered">
        <tr><td><strong>Name:</strong></td><td>{{ user.name }}</td></tr>
        <tr><td><strong>Email:</strong></td><td>{{ user.email }}</td></tr>
        <tr><td><strong>Phone:</strong></td><td>{{ user.phone }}</td></tr>
        <tr><td><strong>Date of Birth:</strong></td><td>{{ user.dob }}</td></tr>
        <tr><td><strong>State:</strong></td><td>{{ user.state }}</td></tr>
        <tr><td><strong>Web Attack Type:</strong></td><td>{{ user.web_attack_type }}</td></tr>
    </table>

    <a href="{% url 'user_dashboard' %}" class="btn btn-secondary btn-back">← Back to Dashboard</a>
</div>

</body>
</html>
