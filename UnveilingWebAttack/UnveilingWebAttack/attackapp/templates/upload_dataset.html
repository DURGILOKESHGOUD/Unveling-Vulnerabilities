<!DOCTYPE html>
<html>
<head>
    <title>Upload CSV Dataset (Admin)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(to right, #eef2f3, #8e9eab);
            font-family: 'Segoe UI', sans-serif;
            padding: 50px;
        }
        .container-box {
            background-color: white;
            max-width: 600px;
            margin: auto;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        h2 {
            color: #0d6efd;
            text-align: center;
            margin-bottom: 30px;
        }
        .form-control {
            margin-bottom: 20px;
        }
        .btn-submit {
            width: 100%;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 25px;
        }
    </style>
</head>
<body>

<div class="container-box">
    <h2>Upload CSV Dataset (Admin)</h2>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <input type="file" name="dataset" accept=".csv" class="form-control" required>
        <button type="submit" class="btn btn-primary btn-submit">Upload</button>
    </form>

    <div class="back-link">
        <a href="{% url 'admin_dashboard' %}" class="btn btn-outline-secondary">← Back to Dashboard</a>
    </div>
</div>

</body>
</html>
